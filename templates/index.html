<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --border: rgba(255,255,255,0.08);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text);
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 50%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { color: var(--text-muted); font-size: 1rem; }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .card-header i { color: var(--accent); font-size: 1.2rem; }
        .card-header h2 { font-size: 1.1rem; font-weight: 600; }
        textarea {
            width: 100%;
            height: 200px;
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'Consolas', 'Monaco', monospace;
            resize: vertical;
            outline: none;
        }
        textarea:focus { border-color: var(--accent); }
        .subtitles-preview {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 16px;
        }
        .subtitle-item {
            display: flex;
            gap: 16px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            align-items: flex-start;
        }
        .subtitle-item:last-child { border-bottom: none; }
        .subtitle-num {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .subtitle-text { flex: 1; line-height: 1.4; }
        .subtitle-time { 
            color: var(--text-muted); 
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-download { display: none; background: linear-gradient(135deg, var(--success), #059669); margin-bottom: 20px; }
        .progress-section { display: none; }
        .progress-section.active { display: block; }
        .progress-log {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 16px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 250px;
            overflow-y: auto;
            color: var(--success);
            line-height: 1.6;
        }
        .progress-log .info { color: var(--accent); }
        .progress-log .scene { color: var(--secondary); }
        .progress-log .error { color: #ef4444; }
        .progress-log .done { color: var(--success); }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            border-radius: 3px;
            transition: width 0.3s;
        }
        .progress-item {
            padding: 6px 12px;
            margin: 4px 0;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .progress-item.scene { color: var(--accent); background: rgba(6, 182, 212, 0.1); }
        .progress-item.tts { color: #FF0080; background: rgba(255, 0, 128, 0.1); }
        .progress-item.frames { color: #00FF00; background: rgba(0, 255, 0, 0.1); }
        .progress-item.ffmpeg { color: #FFFF00; background: rgba(255, 255, 0, 0.1); }
        .progress-item.done { color: var(--success); background: rgba(16, 185, 129, 0.15); }
        .progress-item.error { color: #ef4444; background: rgba(239, 68, 68, 0.15); }
        .progress-item.info { color: var(--text-muted); font-size: 0.8rem; }
        .progress-separator { color: var(--border); text-align: center; padding: 8px; font-size: 0.75rem; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .status-badge.processing {
            background: rgba(139, 92, 246, 0.2);
            color: var(--secondary);
        }
        .status-badge.complete {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }
        .status-badge .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        video {
            width: 100%;
            max-height: 400px;
            border-radius: 12px;
            background: #000;
            margin: 16px 0;
        }
        .video-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-video"></i> Video Generator</h1>
            <p>Transform subtitles into stunning animated videos</p>
        </div>
        
        <div class="card">
            <div class="card-header">
                <i class="fas fa-file-alt"></i>
                <h2>Source VTT Content</h2>
            </div>
            <textarea id="vttContent"></textarea>
        </div>
        
        <div class="card">
            <div class="card-header">
                <i class="fas fa-list-alt"></i>
                <h2>Subtitles Preview</h2>
            </div>
            <div class="subtitles-preview" id="subtitlesPreview">
                <p style="color: var(--text-muted); text-align: center; padding: 20px;">
                    Loading subtitles...
                </p>
            </div>
        </div>
        
        <button class="btn" id="generateBtn">
            <i class="fas fa-magic"></i> Generate Video
        </button>
        
        <div class="card progress-section" id="progressSection">
            <div class="card-header">
                <i class="fas fa-tasks"></i>
                <h2>Progress</h2>
            </div>
            <div class="status-badge processing" id="statusBadge">
                <div class="spinner"></div>
                <span id="statusText">Ready</span>
            </div>
            <div class="progress-bar"><div class="progress-bar-fill" id="progressBar" style="width: 0%"></div></div>
            <div class="progress-log" id="output"></div>
        </div>
        
        <button class="btn btn-download" id="downloadBtn">
            <i class="fas fa-download"></i> Download Video
        </button>
        
        <div class="card" id="videoSection" style="display: none;">
            <div class="card-header">
                <i class="fas fa-play-circle"></i>
                <h2>Your Video</h2>
            </div>
            <video id="videoPlayer" controls>
                <source id="videoSource" src="" type="video/mp4">
            </video>
            <div class="video-actions">
                <button class="btn" id="downloadBtnAlt">
                    <i class="fas fa-download"></i> Download
                </button>
                <button class="btn btn-secondary" onclick="location.href='/'">
                    <i class="fas fa-plus"></i> Create New
                </button>
            </div>
        </div>
    </div>

    <script>
        var polling = false;
        
        document.addEventListener('DOMContentLoaded', function() {
            var vttContentEl = document.getElementById('vttContent');
            var subtitlesPreviewEl = document.getElementById('subtitlesPreview');
            var generateBtn = document.getElementById('generateBtn');
            var videoSection = document.getElementById('videoSection');
            var videoSource = document.getElementById('videoSource');
            
            vttContentEl.value = '';
            videoSection.style.display = 'none';
            
            function loadDefaultVTT() {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', '/default_vtt', true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        var data = JSON.parse(xhr.responseText);
                        vttContentEl.value = data.content;
                        loadSubtitles();
                    }
                };
                xhr.onerror = function() {
                    subtitlesPreviewEl.innerHTML = '<p style="color: #ef4444; text-align: center; padding: 20px;">Error loading default VTT</p>';
                };
                xhr.send();
            }
            
            function loadSubtitles() {
                var vttContent = vttContentEl.value;
                if (!vttContent.trim()) {
                    subtitlesPreviewEl.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">No VTT content</p>';
                    return;
                }
                
                var xhr = new XMLHttpRequest();
                xhr.open('POST', '/parse_vtt', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        var data = JSON.parse(xhr.responseText);
                        if (data.subtitles && data.subtitles.length > 0) {
                            var html = '';
                            for (var i = 0; i < data.subtitles.length; i++) {
                                var sub = data.subtitles[i];
                                html += '<div class="subtitle-item"><div class="subtitle-num">' + (i + 1) + '</div><div class="subtitle-text">' + sub.text + '</div><div class="subtitle-time">' + sub.time + '</div></div>';
                            }
                            subtitlesPreviewEl.innerHTML = html;
                        } else {
                            subtitlesPreviewEl.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">No subtitles found in VTT</p>';
                        }
                    }
                };
                xhr.onerror = function() {
                    subtitlesPreviewEl.innerHTML = '<p style="color: #ef4444; text-align: center; padding: 20px;">Error loading subtitles</p>';
                };
                xhr.send(JSON.stringify({vtt_content: vttContent}));
            }
            
            loadDefaultVTT();
            vttContentEl.addEventListener('input', loadSubtitles);
            
            generateBtn.addEventListener('click', function() {
                var vttContent = vttContentEl.value;
                var progressSection = document.getElementById('progressSection');
                var downloadBtn = document.getElementById('downloadBtn');
                
                generateBtn.disabled = true;
                generateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
                progressSection.classList.add('active');
                downloadBtn.style.display = 'none';
                videoSection.style.display = 'none';
                document.getElementById('output').innerHTML = '<span class="info">Initializing...</span>';
                document.getElementById('statusText').textContent = 'Starting...';
                document.getElementById('progressBar').style.width = '0%';
                
                var xhr = new XMLHttpRequest();
                xhr.open('POST', '/generate', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        polling = true;
                        pollProgress();
                    } else if (xhr.readyState === 4 && xhr.status !== 200) {
                        generateBtn.disabled = false;
                        generateBtn.innerHTML = '<i class="fas fa-magic"></i> Generate Video';
                        document.getElementById('output').innerHTML = '<span class="error">Error starting generation</span>';
                    }
                };
                xhr.send(JSON.stringify({vtt_content: vttContent}));
            });
            
            document.getElementById('downloadBtn').addEventListener('click', downloadVideo);
            document.getElementById('downloadBtnAlt').addEventListener('click', downloadVideo);
            
            function pollProgress() {
                if (!polling) return;
                
                var xhr = new XMLHttpRequest();
                xhr.open('GET', '/progress', true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        var data = JSON.parse(xhr.responseText);
                        
                        if (data.log) {
                            var lines = data.log.split('\n');
                            var html = '';
                            for (var i = 0; i < lines.length; i++) {
                                var line = lines[i].trim();
                                if (!line) continue;
                                if (line.indexOf('[SCENE]') !== -1) {
                                    html += '<div class="progress-item scene">' + line.replace('[SCENE]', '') + '</div>';
                                } else if (line.indexOf('[TTS]') !== -1) {
                                    html += '<div class="progress-item tts">' + line + '</div>';
                                } else if (line.indexOf('[FRAMES]') !== -1) {
                                    html += '<div class="progress-item frames">' + line + '</div>';
                                } else if (line.indexOf('[FFMPEG]') !== -1) {
                                    html += '<div class="progress-item ffmpeg">' + line + '</div>';
                                } else if (line.indexOf('[DONE]') !== -1) {
                                    html += '<div class="progress-item done">' + line + '</div>';
                                } else if (line.indexOf('[ERROR]') !== -1) {
                                    html += '<div class="progress-item error">' + line + '</div>';
                                } else if (line.indexOf('[INFO]') !== -1) {
                                    html += '<div class="progress-item info">' + line + '</div>';
                                } else if (line.indexOf('=====') !== -1) {
                                    html += '<div class="progress-separator">' + line + '</div>';
                                } else if (line) {
                                    html += '<div class="progress-item">' + line + '</div>';
                                }
                            }
                            document.getElementById('output').innerHTML = html;
                            document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
                        }
                        
                        if (data.stage) {
                            document.getElementById('statusText').textContent = data.stage;
                        }
                        
                        if (data.percent !== undefined) {
                            document.getElementById('progressBar').style.width = data.percent + '%';
                        }
                        
                        if (data.done) {
                            polling = false;
                            document.getElementById('generateBtn').disabled = false;
                            document.getElementById('generateBtn').innerHTML = '<i class="fas fa-magic"></i> Generate Video';
                            
                            var statusBadge = document.getElementById('statusBadge');
                            if (data.success) {
                                statusBadge.className = 'status-badge complete';
                                statusBadge.innerHTML = '<i class="fas fa-check-circle"></i><span>Complete!</span>';
                                document.getElementById('downloadBtn').style.display = 'flex';
                                videoSection.style.display = 'block';
                                videoSource.src = '/download/video.mp4?t=' + new Date().getTime();
                                document.getElementById('videoPlayer').load();
                            } else {
                                statusBadge.className = 'status-badge';
                                statusBadge.innerHTML = '<i class="fas fa-exclamation-circle"></i><span>Failed</span>';
                                statusBadge.style.background = 'rgba(239, 68, 68, 0.2)';
                                statusBadge.style.color = '#ef4444';
                            }
                        } else {
                            setTimeout(pollProgress, 300);
                        }
                    }
                };
                xhr.send();
            }
            
            function downloadVideo() {
                window.open('/download/video.mp4', '_blank');
            }
        });
    </script>
</body>
</html>
